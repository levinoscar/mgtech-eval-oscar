
services:
  db:
    image: mysql:8
    container_name: evaluation_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: evaluation_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: candidate_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/usr/src/app/src
      - ./backend/public:/usr/src/app/public
      - ./backend/prisma:/usr/src/app/prisma
      - ./backend/tsconfig.json:/usr/src/app/tsconfig.json
      - ./backend/jest.config.cjs:/usr/src/app/jest.config.cjs
      - ./backend/package.json:/usr/src/app/package.json
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  db_data:
